name: Deploy to EC2

on:
  push:
    branches: [main]

env:
  AWS_REGION:     ${{ secrets.AWS_REGION }}
  ECR_REGISTRY:   ${{ secrets.ECR_REGISTRY }}
  ECR_REPOSITORY: hr-agent
  IMAGE_TAG:      ${{ github.sha }}

jobs:
  # ── Job 1: Build and push Docker image to ECR ────────────────
  build-and-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest

    outputs:
      image: ${{ steps.build.outputs.image }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to ECR
        id: build
        run: |
          IMAGE=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          LATEST=$ECR_REGISTRY/$ECR_REPOSITORY:latest

          docker build -t $IMAGE -t $LATEST .
          docker push $IMAGE
          docker push $LATEST

          echo "image=$IMAGE" >> $GITHUB_OUTPUT

      - name: Image build summary
        run: |
          echo "### Docker Image Built ✅" >> $GITHUB_STEP_SUMMARY
          echo "- Registry: \`$ECR_REGISTRY/$ECR_REPOSITORY\`" >> $GITHUB_STEP_SUMMARY
          echo "- Tag: \`$IMAGE_TAG\`" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY

  # ── Job 2: Deploy to EC2 ─────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:        ${{ secrets.EC2_HOST }}
          username:    ec2-user
          key:         ${{ secrets.EC2_SSH_KEY }}
          timeout:     120s
          script: |
            set -e

            echo "=== Logging into ECR ==="
            aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | \
              docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}

            echo "=== Pulling latest image ==="
            docker pull ${{ secrets.ECR_REGISTRY }}/hr-agent:latest

            echo "=== Stopping existing container ==="
            docker stop hr-agent 2>/dev/null || true
            docker rm   hr-agent 2>/dev/null || true

            echo "=== Starting new container ==="
            docker run -d \
              --name hr-agent \
              --restart unless-stopped \
              -p 8501:8501 \
              -v /home/ec2-user/hr-agent/logs:/app/logs \
              -e GITHUB_TOKEN="${{ secrets.PERSONAL_GITHUB_TOKEN }}" \
              -e LANGSMITH_API_KEY="${{ secrets.LANGSMITH_API_KEY }}" \
              -e LANGCHAIN_PROJECT="hr-agent-prod" \
              -e LANGCHAIN_TRACING_V2="true" \
              -e LANGCHAIN_ENDPOINT="https://api.smith.langchain.com" \
              -e AWS_DEFAULT_REGION="${{ secrets.AWS_REGION }}" \
              -e SMTP_HOST="${{ secrets.SMTP_HOST }}" \
              -e SMTP_PORT="${{ secrets.SMTP_PORT }}" \
              -e SMTP_USER="${{ secrets.SMTP_USER }}" \
              -e SMTP_PASSWORD="${{ secrets.SMTP_PASSWORD }}" \
              ${{ secrets.ECR_REGISTRY }}/hr-agent:latest

            echo "=== Waiting for health check ==="
            sleep 15
            curl -f http://localhost:8501/_stcore/health && \
              echo "Health check passed ✅" || \
              (echo "Health check failed ❌" && docker logs hr-agent --tail 50 && exit 1)

            echo "=== Cleaning up old images ==="
            docker image prune -f

      - name: Deployment summary
        run: |
          echo "### Deployment Complete ✅" >> $GITHUB_STEP_SUMMARY
          echo "- Host: \`${{ secrets.EC2_HOST }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Image tag: \`${{ env.IMAGE_TAG }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- App URL: \`http://${{ secrets.EC2_HOST }}:8501\`" >> $GITHUB_STEP_SUMMARY